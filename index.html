<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Инженер-Сервис — База станков</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: #ffffff;
    --text: #1a1a1a;
    --hint: #8a8a8a;
    --link: #2481cc;
    --button: #2481cc;
    --button-text: #ffffff;
    --secondary-bg: #f2f4f7;
    --border: #e3e7ec;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 0;
    font-family: -apple-system, Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg); color: var(--text);
  }
  #app { padding: 12px 16px 32px; }
  .header { display: flex; justify-content: space-between; align-items: center; padding: 6px 0 14px; }
  .header-user { font-size: 14px; }
  .role { color: var(--hint); font-size: 13px; }
  .header-logo { height: 34px; display: block; }
  .tabs { display: flex; gap: 6px; overflow-x: auto; margin-bottom: 12px; -webkit-overflow-scrolling: touch; }
  .tab-btn {
    flex: 0 0 auto; padding: 8px 14px; border-radius: 20px; border: none;
    background: var(--secondary-bg); color: var(--text); font-size: 14px;
  }
  .tab-btn.active { background: var(--button); color: var(--button-text); }
  .card { background: var(--secondary-bg); border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; border: 1px solid var(--border); }
  .card-title { font-weight: 600; margin-bottom: 4px; }
  .card-sub { font-size: 13px; color: var(--hint); }
  .empty, .loading, .error { color: var(--hint); text-align: center; padding: 24px 0; }
  .error { color: #e53935; }
  .btn-primary {
    display: block; width: 100%; padding: 12px; margin: 8px 0; border: none; border-radius: 10px;
    background: var(--button); color: var(--button-text); font-size: 15px; font-weight: 600;
  }
  .btn-secondary {
    display: inline-block; padding: 9px 14px; margin-top: 8px; border-radius: 8px; border: 1px solid var(--button);
    background: transparent; color: var(--button); font-size: 13px; font-weight: 600;
  }
  .btn-back { background: none; border: none; color: var(--link); padding: 8px 0; font-size: 14px; }
  .field { margin-bottom: 10px; }
  .field label { display: block; font-size: 13px; color: var(--hint); margin-bottom: 4px; }
  .field input, .field textarea, .field select {
    width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border);
    background: #fff; color: var(--text); font-size: 14px; font-family: inherit;
  }
  .field textarea { min-height: 70px; resize: vertical; }
  .detail-row { display: flex; justify-content: space-between; gap: 12px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
  .detail-label { color: var(--hint); flex: 0 0 auto; }
  .photo-preview { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
  .photo-chip { background: #fff; border: 1px solid var(--border); padding: 4px 8px; border-radius: 6px; font-size: 12px; }
  .role-select { display: inline-block; width: auto; margin-top: 4px; }
  .search-input {
    width: 100%; padding: 10px 12px; border-radius: 20px; border: 1px solid var(--border);
    background: #fff; color: var(--text); font-size: 14px; margin-bottom: 10px;
  }
  .status-dash { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
  .status-chip {
    border: 1px solid var(--border); background: #fff; border-radius: 16px; padding: 6px 10px;
    font-size: 12px; color: var(--text); display: flex; align-items: center; gap: 5px;
  }
  .status-chip .chip-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--chip-color, #999); display: inline-block; }
  .status-chip.active { border-color: var(--chip-color, var(--button)); background: color-mix(in srgb, var(--chip-color, var(--button)) 12%, white); font-weight: 600; }
  .status-chip.mine-chip.active { border-color: var(--button); background: color-mix(in srgb, var(--button) 12%, white); font-weight: 600; }
  .status-badge { display: inline-block; padding: 3px 9px; border-radius: 10px; font-size: 11px; color: #fff; font-weight: 600; margin-top: 4px; }
  .eq-card-header { cursor: pointer; }
  .eq-card-body { margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border); }
  h2 { font-size: 18px; margin: 8px 0 14px; }
  h3 { font-size: 15px; margin: 18px 0 8px; color: var(--hint); }
</style>
</head>

  var tg = window.Telegram && window.Telegram.WebApp;
  if (tg) { tg.ready(); tg.expand(); }
  var initData = tg ? tg.initData : '';

  var state = { role: null, fullName: null, permissions: {}, telegramId: null, equipmentList: [], reportsList: [], partsList: [] };
  var app = document.getElementById('app');

  var STATUS_CONFIG = [
    { name: 'Заявка', color: '#9e9e9e' },
    { name: 'Запланирован', color: '#42a5f5' },
    { name: 'Осмотрен', color: '#26c6da' },
    { name: 'В работе', color: '#ffa726' },
    { name: 'Проблема', color: '#ef5350' },
    { name: 'Ожидание ЗИП', color: '#ab47bc' },
    { name: 'Выставлен Счет', color: '#8d6e63', hideFromMaster: true },
    { name: 'Оплачен', color: '#66bb6a', hideFromMaster: true },
    { name: 'Сдан', color: '#78909c' }
  ];

  function visibleStatuses() {
    return STATUS_CONFIG.filter(function (s) { return !(s.hideFromMaster && state.role === 'Мастер'); });
  }

  function statusColorFor(status) {
    var found = STATUS_CONFIG.find(function (s) { return s.name === status; });
    return found ? found.color : '#9e9e9e';
  }

  var equipmentFilterState = { status: null, mine: false, query: '' };

  // Вызов серверной функции Apps Script через fetch (обычный JSON API, без iframe-песочницы)
  function call(fnName) {
    var args = Array.prototype.slice.call(arguments, 1);
    return fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: fnName, args: [initData].concat(args) })
    })
      .then(function (r) { return r.json(); })
      .then(function (res) {
        if (res && res.success) return res.data;
        throw new Error((res && res.error) || 'Неизвестная ошибка');
      });
  }

  function can(action) {
    return state.role === 'Создатель' || !!state.permissions[action];
  }

  // Собирает всех ответственных станка независимо от того, сколько колонок "Ответственный N" реально есть
  function getResponsibles(e) {
    return Object.keys(e).filter(function (k) { return /^Ответственный \d+$/.test(k); })
      .sort(function (a, b) { return parseInt(a.replace('Ответственный ', ''), 10) - parseInt(b.replace('Ответственный ', ''), 10); })
      .map(function (k) { return e[k]; })
      .filter(Boolean);
  }

  function init() {
    if (API_URL.indexOf('ВСТАВЬТЕ') === 0) {
      app.innerHTML = '<div class="error">Разработчик не указал API_URL в app-static.html</div>';
      return;
    }
    if (!initData) {
      var debugInfo =
        'Telegram.WebApp объект: ' + (tg ? 'есть' : 'НЕТ') + '<br>' +
        'initData: ' + (initData === '' ? 'пустая строка' : String(initData)) + '<br>' +
        'platform: ' + (tg ? tg.platform : '-') + '<br>' +
        'version: ' + (tg ? tg.version : '-') + '<br>' +
        'URL: ' + window.location.href;
      app.innerHTML =
        '<div class="error">Откройте приложение через Telegram-бота.</div>' +
        '<div style="font-size:11px;color:var(--hint);margin-top:16px;word-break:break-all;padding:10px;background:var(--secondary-bg);border-radius:8px;">' +
        '<b>Диагностика:</b><br>' + debugInfo + '</div>';
      return;
    }
    call('authenticate').then(function (data) {
      if (data.pending) {
        app.innerHTML =
          '<div style="text-align:center;padding:32px 12px;">' +
          '<div style="font-size:40px;margin-bottom:12px;">⏳</div>' +
          '<div style="font-size:16px;font-weight:600;margin-bottom:10px;">Ваша заявка на рассмотрении</div>' +
          '<div style="color:var(--hint);font-size:14px;margin-bottom:16px;">Администратор получил уведомление и скоро подтвердит доступ.</div>' +
          '<div style="background:var(--secondary-bg);border-radius:10px;padding:10px;font-size:13px;">Ваш Telegram ID:<br><b style="font-size:16px;">' + escapeHtml(data.telegramId) + '</b></div>' +
          '</div>';
        return;
      }
      state.role = data.role;
      state.fullName = data.fullName;
      state.telegramId = data.telegramId;
      state.permissions = data.permissions;
      renderShell();
    }).catch(function (err) {
      app.innerHTML = '<div class="error">Ошибка входа: ' + escapeHtml(err.message || err) + '</div>';
    });
  }

  function renderShell() {
    var tabs = [];
    if (can('equipment.view')) tabs.push(['equipment', 'Главная']);
    if (can('reports.view')) tabs.push(['reports', 'Отчеты']);
    if (can('parts.view')) tabs.push(['parts', 'Запчасти']);
    if (can('users.view')) tabs.push(['users', 'Пользователи']);

    app.innerHTML =
      '<div class="header"><div class="header-user">' + escapeHtml(state.fullName) + ' <span class="role">(' + escapeHtml(state.role) + ')</span></div>' +
      '<img class="header-logo" src="data:image/jpeg;base64,' + LOGO_B64 + '" alt="Инженер-Сервис"></div>' +
      '<div class="tabs">' + tabs.map(function (t) {
        return '<button class="tab-btn" data-tab="' + t[0] + '">' + t[1] + '</button>';
      }).join('') + '</div>' +
      '<div id="content"></div>';

    Array.prototype.forEach.call(document.querySelectorAll('.tab-btn'), function (btn) {
      btn.addEventListener('click', function () { setTab(btn.dataset.tab); });
    });
    setTab(tabs.length ? tabs[0][0] : null);
  }

  function setTab(tab) {
    Array.prototype.forEach.call(document.querySelectorAll('.tab-btn'), function (btn) {
      btn.classList.toggle('active', btn.dataset.tab === tab);
    });
    if (tab === 'equipment') renderEquipment();
    else if (tab === 'reports') renderReports();
    else if (tab === 'parts') renderParts();
    else if (tab === 'users') renderUsers();
  }

  // Глобальный делегированный обработчик для кнопки "Стать ответственным" —
  // она встречается на карточках отчётов в разных местах приложения.
  document.addEventListener('click', function (e) {
    var btn = e.target.closest && e.target.closest('.claim-resp-btn');
    if (!btn) return;
    e.stopPropagation();
    var eqId = btn.dataset.eqid;
    btn.disabled = true;
    call('claimResponsibility', eqId).then(function (res) {
      btn.disabled = false;
      var msg = res.already ? 'Вы уже ответственны за этот станок' : 'Вы назначены ответственным (' + res.column + ')';
      if (tg && tg.showAlert) tg.showAlert(msg); else alert(msg);
    }).catch(function (err) { btn.disabled = false; showError(err); });
  });

  // ---------- Главная (Оборудование + дашборд) ----------
  function renderEquipment() {
    var content = document.getElementById('content');
    content.innerHTML = '<div class="loading">Загрузка...</div>';
    call('getEquipmentList').then(function (list) {
      state.equipmentList = list;
      equipmentFilterState = { status: null, mine: false, query: equipmentFilterState.query || '' };
      renderEquipmentHome();
    }).catch(showError);
  }

  function renderEquipmentHome() {
    var content = document.getElementById('content');
    var list = state.equipmentList || [];

    var buttonsHtml = '';
    if (can('equipment.create')) buttonsHtml += '<button class="btn-primary" id="add-eq">+ Добавить оборудование</button>';
    if (can('reports.create')) buttonsHtml += '<button class="btn-primary" id="add-report-home">+ Добавить отчет</button>';

    var dashboardHtml = '<div class="status-dash">' +
      visibleStatuses().map(function (s) {
        var count = list.filter(function (e) { return e['Статус'] === s.name; }).length;
        var active = equipmentFilterState.status === s.name;
        return '<button class="status-chip' + (active ? ' active' : '') + '" data-status="' + escapeHtml(s.name) + '" style="--chip-color:' + s.color + '">' +
          '<span class="chip-dot"></span>' + escapeHtml(s.name) + ' <b>' + count + '</b></button>';
      }).join('') +
      '<button class="status-chip mine-chip' + (equipmentFilterState.mine ? ' active' : '') + '" id="mine-filter">👤 Мои станки</button>' +
      '</div>';

    content.innerHTML = buttonsHtml +
      '<input type="text" class="search-input" id="global-search" placeholder="Поиск по всей базе..." value="' + escapeHtml(equipmentFilterState.query) + '">' +
      dashboardHtml +
      '<div class="list" id="eq-list"></div>';

    if (can('equipment.create')) document.getElementById('add-eq').addEventListener('click', function () { openEquipmentForm(null); });
    if (can('reports.create')) document.getElementById('add-report-home').addEventListener('click', function () { openReportForm(); });

    var searchInput = document.getElementById('global-search');
    searchInput.addEventListener('input', function (e) {
      equipmentFilterState.query = e.target.value;
      renderFilteredEquipmentList();
    });
    Array.prototype.forEach.call(document.querySelectorAll('.status-chip[data-status]'), function (btn) {
      btn.addEventListener('click', function () {
        var s = btn.dataset.status;
        equipmentFilterState.status = equipmentFilterState.status === s ? null : s;
        renderEquipmentHome();
      });
    });
    document.getElementById('mine-filter').addEventListener('click', function () {
      equipmentFilterState.mine = !equipmentFilterState.mine;
      renderEquipmentHome();
    });

    renderFilteredEquipmentList();
    searchInput.focus();
    searchInput.selectionStart = searchInput.selectionEnd = searchInput.value.length;
  }

  function renderFilteredEquipmentList() {
    var list = state.equipmentList || [];
    var searchFields = ['ID станка', 'Инвентарный номер', 'Наш номер', 'Тип оборудования', 'Модель', 'Завод изготовитель', 'Статус', 'Заказчик', 'Контактное лицо', 'Адрес', 'Комментарий'];
    var filtered = filterList(list, equipmentFilterState.query, searchFields);
    if (equipmentFilterState.status) {
      filtered = filtered.filter(function (e) { return e['Статус'] === equipmentFilterState.status; });
    }
    if (equipmentFilterState.mine) {
      filtered = filtered.filter(function (e) { return getResponsibles(e).indexOf(state.fullName) !== -1; });
    }
    var listEl = document.getElementById('eq-list');
    listEl.innerHTML = filtered.length ? filtered.map(renderEquipmentCard).join('') : '<div class="empty">Ничего не найдено</div>';

    Array.prototype.forEach.call(document.querySelectorAll('.eq-card'), function (card) {
      card.querySelector('.eq-card-header').addEventListener('click', function () { toggleEquipmentCard(card); });
    });
    Array.prototype.forEach.call(document.querySelectorAll('.eq-edit-btn'), function (b) {
      b.addEventListener('click', function (ev) {
        ev.stopPropagation();
        var eq = list.find(function (x) { return String(x['ID станка']) === b.dataset.id; });
        openEquipmentForm(eq);
      });
    });
    Array.prototype.forEach.call(document.querySelectorAll('.eq-addreport-btn'), function (b) {
      b.addEventListener('click', function (ev) { ev.stopPropagation(); openReportForm(b.dataset.id); });
    });
  }

  function renderEquipmentCard(e) {
    var id = e['ID станка'];
    var responsibles = getResponsibles(e);
    var statusHtml = e['Статус'] ? '<span class="status-badge" style="background:' + statusColorFor(e['Статус']) + '">' + escapeHtml(e['Статус']) + '</span>' : '';
    return '<div class="card eq-card" data-id="' + escapeHtml(id) + '">' +
      '<div class="eq-card-header">' +
        '<div class="card-title">' + escapeHtml(e['Тип оборудования'] || '') + ' — ' + escapeHtml(e['Модель'] || '') + '</div>' +
        '<div class="card-sub">Наш № ' + escapeHtml(e['Наш номер'] || '-') + ' · Инв. № ' + escapeHtml(e['Инвентарный номер'] || '-') + '</div>' +
        statusHtml +
      '</div>' +
      '<div class="eq-card-body" style="display:none;">' +
        detailRow('Наш номер', e['Наш номер']) +
        detailRow('Инвентарный №', e['Инвентарный номер']) +
        detailRow('Год выпуска', e['Год выпуска']) +
        detailRow('Завод', e['Завод изготовитель']) +
        detailRow('Статус', e['Статус']) +
        detailRow('Заказчик', e['Заказчик']) +
        detailRow('Контакт', e['Контактное лицо']) +
        detailRow('Адрес', e['Адрес']) +
        detailRow('Комментарий', e['Комментарий']) +
        detailRow('Ответственные', responsibles.join(', ') || '—') +
        (can('equipment.edit') ? '<button class="btn-primary eq-edit-btn" data-id="' + escapeHtml(id) + '">Редактировать</button>' : '') +
        (can('reports.create') ? '<button class="btn-primary eq-addreport-btn" data-id="' + escapeHtml(id) + '">+ Добавить отчет</button>' : '') +
        '<h3>История ремонта</h3><div class="eq-history" id="hist-' + escapeHtml(id) + '"></div>' +
      '</div>' +
    '</div>';
  }

  function toggleEquipmentCard(card) {
    var body = card.querySelector('.eq-card-body');
    var isOpen = body.style.display !== 'none';
    if (isOpen) { body.style.display = 'none'; return; }
    body.style.display = 'block';
    var id = card.dataset.id;
    var histEl = document.getElementById('hist-' + id);
    if (histEl.dataset.loaded) return;
    histEl.innerHTML = '<div class="loading">Загрузка истории...</div>';
    var eq = (state.equipmentList || []).find(function (x) { return String(x['ID станка']) === String(id); });
    call('getReports', id).then(function (reports) {
      histEl.dataset.loaded = '1';
      reports.forEach(function (r) {
        r._ourNumber = eq ? (eq['Наш номер'] || '') : '';
        r._eqLabel = eq ? [eq['Тип оборудования'], eq['Модель']].filter(Boolean).join(' ') : '';
      });
      histEl.innerHTML = reports.length ? reports.map(renderReportCard).join('') : '<div class="empty">Отчетов пока нет</div>';
    }).catch(showError);
  }

  function openEquipmentForm(eq) {
    var content = document.getElementById('content');
    var f = eq || {};
    var list = state.equipmentList || [];
    content.innerHTML =
      '<button class="btn-back">← Назад</button>' +
      '<h2>' + (eq ? 'Редактирование оборудования' : 'Новое оборудование') + '</h2>' +
      formField('invNumber', 'Инвентарный номер', f['Инвентарный номер'], false, 'dl-inv') +
      formField('ourNumber', 'Наш номер', f['Наш номер'], false, 'dl-our') +
      formField('type', 'Тип оборудования', f['Тип оборудования'], false, 'dl-type') +
      formField('model', 'Модель', f['Модель'], false, 'dl-model') +
      formField('year', 'Год выпуска', f['Год выпуска'], false, null, 'number') +
      formField('factory', 'Завод изготовитель', f['Завод изготовитель'], false, 'dl-factory') +
      selectField('status', 'Статус', visibleStatuses().map(function (s) { return s.name; }), f['Статус'] || '') +
      formField('customer', 'Заказчик', f['Заказчик'], false, 'dl-customer') +
      formField('contact', 'Контактное лицо', f['Контактное лицо'], false, 'dl-contact') +
      formField('address', 'Адрес', f['Адрес'], false, 'dl-address') +
      formField('comment', 'Комментарий', f['Комментарий'], true) +
      formField('resp1', 'Ответственный 1 (ФИО)', f['Ответственный 1'], false, 'dl-resp') +
      formField('resp2', 'Ответственный 2 (ФИО)', f['Ответственный 2'], false, 'dl-resp') +
      formField('resp3', 'Ответственный 3 (ФИО)', f['Ответственный 3'], false, 'dl-resp') +
      photoField('eq-photo') +
      '<button class="btn-primary" id="save-eq">Сохранить</button>' +
      buildDatalist('dl-inv', fieldValues(list, 'Инвентарный номер')) +
      buildDatalist('dl-our', fieldValues(list, 'Наш номер')) +
      buildDatalist('dl-type', fieldValues(list, 'Тип оборудования')) +
      buildDatalist('dl-model', fieldValues(list, 'Модель')) +
      buildDatalist('dl-factory', fieldValues(list, 'Завод изготовитель')) +
      buildDatalist('dl-customer', fieldValues(list, 'Заказчик')) +
      buildDatalist('dl-contact', fieldValues(list, 'Контактное лицо')) +
      buildDatalist('dl-address', fieldValues(list, 'Адрес')) +
      buildDatalist('dl-resp', fieldValues(list, 'Ответственный 1').concat(fieldValues(list, 'Ответственный 2'), fieldValues(list, 'Ответственный 3')));

    content.querySelector('.btn-back').addEventListener('click', renderEquipment);
    setupPhotoField('eq-photo');

    document.getElementById('save-eq').addEventListener('click', function () {
      var data = collectForm(['invNumber', 'ourNumber', 'type', 'model', 'year', 'factory', 'status', 'customer', 'contact', 'address', 'comment', 'resp1', 'resp2', 'resp3']);
      uploadPendingPhotos('eq-photo').then(function (fileIds) {
        if (fileIds.length) data.photoFileIds = fileIds;
        return eq ? call('updateEquipment', eq['ID станка'], data) : call('addEquipment', data);
      }).then(renderEquipment).catch(showError);
    });
  }

  // ---------- Отчеты ----------
  function renderReports() {
    var content = document.getElementById('content');
    content.innerHTML = '<div class="loading">Загрузка...</div>';
    Promise.all([call('getReports'), call('getEquipmentList')]).then(function (res) {
      var list = res[0];
      var eqList = res[1];
      state.equipmentList = eqList;
      var eqById = {};
      eqList.forEach(function (e) { eqById[e['ID станка']] = e; });
      list.forEach(function (r) {
        var eq = eqById[r['ID Станка']];
        r._ourNumber = eq ? (eq['Наш номер'] || '') : '';
        r._eqLabel = eq ? [eq['Тип оборудования'], eq['Модель']].filter(Boolean).join(' ') : '';
      });
      state.reportsList = list;
      content.innerHTML = '<div class="list" id="rep-list">' + (list.length ? list.map(renderReportCard).join('') : '<div class="empty">Отчетов нет</div>') + '</div>';
    }).catch(showError);
  }

  function renderReportCard(r) {
    return '<div class="card">' +
      '<div class="card-title">Наш № ' + escapeHtml(r._ourNumber || '—') + (r._eqLabel ? ' · ' + escapeHtml(r._eqLabel) : '') + '</div>' +
      '<div class="card-sub">ID станка: ' + escapeHtml(r['ID Станка']) + ' · ' + escapeHtml(r['Статус'] || '') + '</div>' +
      '<div class="card-sub">' + escapeHtml(r['Дата проведения работ'] || '') + ' — ' + escapeHtml(r['Кто заполнил'] || '') + '</div>' +
      '<div class="card-sub">' + escapeHtml((r['Описание работ'] || '').slice(0, 140)) + '</div>' +
      (can('reports.create') ? '<button class="btn-secondary claim-resp-btn" data-eqid="' + escapeHtml(r['ID Станка']) + '">👤 Стать ответственным</button>' : '') +
      '</div>';
  }

  function openReportForm(equipmentId) {
    var content = document.getElementById('content');
    var reports = state.reportsList || [];
    var eqList = state.equipmentList || [];
    var presetEq = equipmentId ? eqList.find(function (e) { return String(e['ID станка']) === String(equipmentId); }) : null;
    var presetOurNumber = presetEq ? (presetEq['Наш номер'] || '') : '';

    content.innerHTML =
      '<button class="btn-back">← Назад</button>' +
      '<h2>Новый отчет</h2>' +
      formField('ourNumber', 'Наш номер станка', presetOurNumber, false, 'dl-ournum') +
      '<div class="field"><label>Станок (определяется автоматически)</label>' +
      '<input id="f-equipmentId" value="' + escapeHtml(equipmentId || '') + '" readonly style="opacity:.65;"></div>' +
      '<div id="eq-match-hint" style="font-size:12px;color:var(--hint);margin:-6px 0 10px;"></div>' +
      formField('workDate', 'Дата проведения работ', '', false, null, 'date') +
      formField('description', 'Описание работ', '', true) +
      formField('ourParts', 'Наши запчасти', '', true, 'dl-ourparts') +
      formField('customerParts', 'Запчасти заказчика', '', true, 'dl-custparts') +
      formField('neededNextTime', 'Что необходимо в следующий раз', '', true) +
      formField('neededFuture', 'Что потребуется в дальнейшем', '', true) +
      formField('plannedWork', 'Запланированные работы', '', true) +
      formField('nextWorkDate', 'Дата следующих работ', '', false, null, 'date') +
      selectField('status', 'Статус', visibleStatuses().map(function (s) { return s.name; }), '') +
      photoField('rep-photo') +
      '<button class="btn-primary" id="save-report">Сохранить</button>' +
      buildDatalist('dl-ournum', fieldValues(eqList, 'Наш номер')) +
      buildDatalist('dl-ourparts', fieldValues(reports, 'Наши запчасти')) +
      buildDatalist('dl-custparts', fieldValues(reports, 'Запчасти заказчика'));

    content.querySelector('.btn-back').addEventListener('click', renderReports);
    setupPhotoField('rep-photo');

    function matchByOurNumber() {
      var val = document.getElementById('f-ourNumber').value.trim();
      var match = eqList.find(function (e) { return String(e['Наш номер'] || '').toLowerCase() === val.toLowerCase(); });
      var idInput = document.getElementById('f-equipmentId');
      var hint = document.getElementById('eq-match-hint');
      if (match) {
        idInput.value = match['ID станка'];
        hint.textContent = '✓ ' + [match['Тип оборудования'], match['Модель']].filter(Boolean).join(' ');
        hint.style.color = 'var(--hint)';
      } else {
        idInput.value = '';
        hint.textContent = val ? 'Станок с таким "Наш номер" не найден' : '';
        hint.style.color = val ? '#e53935' : 'var(--hint)';
      }
    }
    document.getElementById('f-ourNumber').addEventListener('input', matchByOurNumber);
    if (presetOurNumber) matchByOurNumber();

    document.getElementById('save-report').addEventListener('click', function () {
      var data = collectForm(['equipmentId', 'workDate', 'description', 'ourParts', 'customerParts', 'neededNextTime', 'neededFuture', 'plannedWork', 'nextWorkDate', 'status']);
      if (!data.equipmentId) { showError(new Error('Не удалось определить станок по «Наш номер» — проверьте значение')); return; }
      uploadPendingPhotos('rep-photo').then(function (fileIds) {
        if (fileIds.length) data.photoFileIds = fileIds;
        return call('addReport', data);
      }).then(renderReports).catch(showError);
    });
  }

  // ---------- Запчасти ----------
  function renderParts() {
    var content = document.getElementById('content');
    content.innerHTML = '<div class="loading">Загрузка...</div>';
    call('getParts').then(function (list) {
      state.partsList = list;
      var html = '';
      if (can('parts.create')) html += '<button class="btn-primary" id="add-part">+ Заявка на запчасть</button>';
      html += '<div class="list">' + (list.length ? list.map(function (p) {
        return '<div class="card"><div class="card-title">' + escapeHtml(p['Наименование']) + ' × ' + escapeHtml(p['Количество']) + '</div>' +
          '<div class="card-sub">Станок ' + escapeHtml(p['ID станка'] || '') + ' · ' + escapeHtml(p['Адрес'] || '') + '</div></div>';
      }).join('') : '<div class="empty">Заявок нет</div>') + '</div>';
      content.innerHTML = html;
      if (can('parts.create')) document.getElementById('add-part').addEventListener('click', openPartForm);
    }).catch(showError);
  }

  function openPartForm() {
    var content = document.getElementById('content');
    var parts = state.partsList || [];
    content.innerHTML =
      '<button class="btn-back">← Назад</button>' +
      '<h2>Заявка на запчасть</h2>' +
      formField('name', 'Наименование', '', false, 'dl-partname') +
      formField('qty', 'Количество', '') +
      formField('equipmentId', 'ID станка', '', false, 'dl-eq2') +
      formField('address', 'Адрес', '', false, 'dl-partaddr') +
      '<button class="btn-primary" id="save-part">Сохранить</button>' +
      buildDatalist('dl-partname', fieldValues(parts, 'Наименование')) +
      equipmentDatalist('dl-eq2') +
      buildDatalist('dl-partaddr', fieldValues(parts, 'Адрес'));
    content.querySelector('.btn-back').addEventListener('click', renderParts);
    document.getElementById('save-part').addEventListener('click', function () {
      var data = collectForm(['name', 'qty', 'equipmentId', 'address']);
      call('addPart', data).then(renderParts).catch(showError);
    });
  }

  // ---------- Пользователи ----------
  function renderUsers() {
    var content = document.getElementById('content');
    content.innerHTML = '<div class="loading">Загрузка...</div>';
    call('getUsers').then(function (list) {
      var html = '';
      if (can('users.create')) html += '<button class="btn-primary" id="add-user">+ Пользователь</button>';
      html += '<div class="list">' + list.map(function (u) {
        return '<div class="card"><div class="card-title">' + escapeHtml(u['ФИО']) + '</div>' +
          '<div class="card-sub">ID ' + escapeHtml(u['Telegram ID']) + '</div>' +
          '<select class="role-select" data-id="' + escapeHtml(u['Telegram ID']) + '" ' + (can('users.edit_role') ? '' : 'disabled') + '>' +
          ['Создатель', 'Админ', 'Мастер'].map(function (r) {
            return '<option value="' + r + '"' + (r === u['Роль'] ? ' selected' : '') + '>' + r + '</option>';
          }).join('') + '</select></div>';
      }).join('') + '</div>';
      content.innerHTML = html;
      if (can('users.create')) document.getElementById('add-user').addEventListener('click', openUserForm);
      Array.prototype.forEach.call(document.querySelectorAll('.role-select'), function (sel) {
        sel.addEventListener('change', function () {
          call('updateUserRole', sel.dataset.id, sel.value).catch(showError);
        });
      });
    }).catch(showError);
  }

  function openUserForm() {
    var content = document.getElementById('content');
    content.innerHTML =
      '<button class="btn-back">← Назад</button>' +
      '<h2>Новый пользователь</h2>' +
      formField('telegramId', 'Telegram ID', '') +
      formField('fullName', 'ФИО', '') +
      '<div class="field"><label>Роль</label><select id="f-role">' +
      ['Админ', 'Мастер'].map(function (r) { return '<option value="' + r + '">' + r + '</option>'; }).join('') +
      '</select></div>' +
      '<button class="btn-primary" id="save-user">Сохранить</button>';
    content.querySelector('.btn-back').addEventListener('click', renderUsers);
    document.getElementById('save-user').addEventListener('click', function () {
      var data = collectForm(['telegramId', 'fullName']);
      data.role = document.getElementById('f-role').value;
      call('addUser', data).then(renderUsers).catch(showError);
    });
  }

  // ---------- Общие хелперы UI ----------
  function formField(id, label, value, textarea, listId, inputType) {
    value = value == null ? '' : String(value);
    var listAttr = listId ? ' list="' + listId + '"' : '';
    var typeAttr = ' type="' + (inputType || 'text') + '"';
    return '<div class="field"><label>' + label + '</label>' +
      (textarea ? '<textarea id="f-' + id + '">' + escapeHtml(value) + '</textarea>'
        : '<input id="f-' + id + '"' + typeAttr + listAttr + ' value="' + escapeHtml(value) + '" autocomplete="off">') + '</div>';
  }

  function selectField(id, label, options, selected) {
    return '<div class="field"><label>' + label + '</label><select id="f-' + id + '">' +
      '<option value="">— не выбрано —</option>' +
      options.map(function (o) {
        return '<option value="' + escapeHtml(o) + '"' + (o === selected ? ' selected' : '') + '>' + escapeHtml(o) + '</option>';
      }).join('') + '</select></div>';
  }

  function filterList(list, query, fields) {
    if (!query) return list;
    var q = query.toLowerCase();
    return list.filter(function (item) {
      return fields.some(function (f) { return String(item[f] || '').toLowerCase().indexOf(q) !== -1; });
    });
  }

  function fieldValues(list, key) {
    var seen = {};
    var result = [];
    (list || []).forEach(function (o) {
      var v = o[key];
      if (v && !seen[v]) { seen[v] = true; result.push(String(v)); }
    });
    return result;
  }

  function buildDatalist(id, values) {
    return '<datalist id="' + id + '">' + values.map(function (v) {
      return '<option value="' + escapeHtml(v) + '">';
    }).join('') + '</datalist>';
  }

  function equipmentDatalist(listId) {
    var list = state.equipmentList || [];
    return '<datalist id="' + listId + '">' + list.map(function (e) {
      var label = [e['Тип оборудования'], e['Модель']].filter(Boolean).join(' ') +
        (e['Инвентарный номер'] ? ' (инв. № ' + e['Инвентарный номер'] + ')' : '');
      return '<option value="' + escapeHtml(e['ID станка']) + '">' + escapeHtml(label) + '</option>';
    }).join('') + '</datalist>';
  }

  function detailRow(label, value) {
    return '<div class="detail-row"><span class="detail-label">' + label + '</span><span>' + escapeHtml(value || '-') + '</span></div>';
  }

  function collectForm(ids) {
    var data = {};
    ids.forEach(function (id) { data[id] = document.getElementById('f-' + id).value; });
    return data;
  }

  function photoField(fieldId) {
    return '<div class="field"><label>Фото (опционально, хранятся в Telegram)</label>' +
      '<input type="file" accept="image/*" multiple id="' + fieldId + '-input">' +
      '<div class="photo-preview" id="' + fieldId + '-preview"></div></div>';
  }

  function setupPhotoField(fieldId) {
    var input = document.getElementById(fieldId + '-input');
    input._files = [];
    input.addEventListener('change', function () {
      input._files = Array.prototype.slice.call(input.files);
      document.getElementById(fieldId + '-preview').innerHTML =
        input._files.map(function (f) { return '<div class="photo-chip">' + escapeHtml(f.name) + '</div>'; }).join('');
    });
  }

  function uploadPendingPhotos(fieldId) {
    var input = document.getElementById(fieldId + '-input');
    var files = (input && input._files) || [];
    if (!files.length) return Promise.resolve([]);
    return Promise.all(files.map(fileToUpload));
  }

  function fileToUpload(file) {
    return new Promise(function (resolve, reject) {
      var reader = new FileReader();
      reader.onload = function () {
        var base64 = reader.result.split(',')[1];
        call('uploadPhoto', base64, file.type, file.name).then(function (res) {
          resolve(res.fileId);
        }).catch(reject);
      };
      reader.onerror = function () { reject(new Error('Не удалось прочитать файл')); };
      reader.readAsDataURL(file);
    });
  }

  function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }

  function showError(err) {
    var msg = String((err && err.message) || err);
    if (tg && tg.showAlert) tg.showAlert(msg); else alert(msg);
  }

  init();
})();
</script>
</body>
</html>
